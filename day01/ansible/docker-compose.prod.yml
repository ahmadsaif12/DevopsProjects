services:
 
  db:
    image: mysql:8.0
    container_name: devops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: devopsdb
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10


  backend:
    image: saifahmad123/devops01-backend:latest
    container_name: devops-backend
    ports:
      - "8081:8080"     
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/devopsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # --- Frontend ---
  frontend:
    image: saifahmad123/devops01-frontend:latest
    container_name: devops-frontend
    ports:
      - "3000:80"      
    environment:
      - VITE_API_URL=http://3.236.149.104:8081   
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: