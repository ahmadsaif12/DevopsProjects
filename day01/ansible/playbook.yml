- name: Deploy app using Docker Compose with Jenkins
  hosts: web
  become: true

  vars:
    app_dir: /home/ubuntu/app
    jenkins_port: 8080
    jenkins_home: /var/lib/jenkins

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Remove conflicting containerd
      apt:
        name:
          - containerd
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Install required system packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - docker.io
          - docker-compose
        state: present

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

   
    - name: Install Java (Jenkins dependency)
      apt:
        name:
          - openjdk-17-jdk
        state: present
        update_cache: yes

    - name: Add Jenkins GPG key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        dest: /usr/share/keyrings/jenkins-keyring.asc
        mode: "0644"

    - name: Add Jenkins apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins

    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Ensure Jenkins is started and enabled
      service:
        name: jenkins
        state: started
        enabled: true

    - name: Wait for Jenkins to start up
      wait_for:
        port: "{{ jenkins_port }}"
        delay: 15
        timeout: 120

    - name: Fetch Jenkins initial admin password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_init_password
      changed_when: false

    - name: Display Jenkins initial admin password
      debug:
        msg: "Jenkins Initial Admin Password: {{ jenkins_init_password.stdout }}"

  
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy docker-compose file
      copy:
        src: docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Remove unused Docker images (safe cleanup)
      shell: docker image prune -f
      changed_when: false

    - name: Pull latest images
      community.docker.docker_compose:
        project_src: "{{ app_dir }}"
        pull: yes

    - name: Stop existing containers
      community.docker.docker_compose:
        project_src: "{{ app_dir }}"
        state: absent

    - name: Start containers
      community.docker.docker_compose:
        project_src: "{{ app_dir }}"
        state: present